name: "⚙️ Docs PR Build and Preview Deploy"

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths:
      - docs/**
      - editors/**
      - .github/workflows/docs-*.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    name: "⚙️ Build Docs"
    uses: ./.github/workflows/docs-build.yml
    with:
      upload_artifact: true

  deploy-preview:
    name: "🚀 Deploy Preview to Cloudflare Pages"
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 5
    if: github.event.pull_request.draft == false
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    steps:
      - name: "☁️ Download docs artifact"
        uses: actions/download-artifact@v4
        with:
          name: docs-build-artifact
          path: docs-dist

      - name: "🚀 Publish preview"
        id: publish_preview
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy docs-dist --project-name=trust-pdf
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: "💬 Comment preview URL"
        if: steps.publish_preview.outputs['deployment-url'] != ''
        uses: actions/github-script@v9
        env:
          PREVIEW_URL: ${{ steps.publish_preview.outputs['deployment-url'] }}
        with:
          script: |
            const marker = "<!-- docs-preview-comment -->";
            const body = `${marker}\n🚀 Docs preview deployed: ${process.env.PREVIEW_URL}`;
            const issue_number = context.issue.number;
            const { owner, repo } = context.repo;

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) =>
              comment.user?.type === "Bot" && comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
