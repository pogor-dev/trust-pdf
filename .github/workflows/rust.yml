name: Rust
on:
  push:
    branches: ["main"]
    paths:
      - rust/**
      - .github/workflows/rust.yml
      - .github/rust.json
  pull_request:
    branches: ["main"]
    paths:
      - rust/**
      - .github/workflows/rust.yml
      - .github/rust.json

permissions:
  contents: read
  actions: read
  checks: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  build-and-test:
    name: Build and Test Rust crates (${{ matrix.os }}, ${{ matrix.arch }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x64
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            arch: x86
            target: i686-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            arch: arm64
            target: aarch64-unknown-linux-gnu
          - os: windows-latest
            arch: x64
            target: x86_64-pc-windows-msvc
          - os: windows-latest
            arch: x86
            target: i686-pc-windows-msvc
          - os: windows-11-arm
            arch: arm64
            target: aarch64-pc-windows-msvc
          - os: macos-15-intel
            arch: x64
            target: x86_64-apple-darwin
          - os: macos-latest
            arch: arm64
            target: aarch64-apple-darwin

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1

      # https://github.com/actions-rust-lang/setup-rust-toolchain/blob/main/rust.json
      - name: Install Rust Problem Matcher
        if: matrix.os == 'ubuntu-latest'
        run: echo "::add-matcher::.github/rust.json"

      - name: Cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            rust/target/
          key: ${{ runner.os }}-${{ matrix.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Install cargo-llvm-cov
        if: matrix.os == 'ubuntu-latest' && matrix.arch == 'x64'
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Install Rust target
        working-directory: rust
        run: rustup target add ${{ matrix.target }}

      - name: Install 32-bit Linux linker deps
        if: matrix.os == 'ubuntu-latest' && matrix.arch == 'x86'
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y gcc-multilib libc6-dev-i386

      - name: Bump opt-level
        if: matrix.os == 'ubuntu-latest'
        working-directory: rust
        run: sed -i '/\[profile.dev]/a opt-level=1' Cargo.toml

      - name: Run Clippy
        working-directory: rust
        run: cargo clippy --all --all-features --target ${{ matrix.target }} -- -D warnings

      - name: Run Format Check
        working-directory: rust
        run: cargo fmt --all --check

      - name: Compile (tests)
        working-directory: rust
        run: cargo nextest run --no-run --locked --target ${{ matrix.target }}

        # It's faster to `test` before `build` ¯\_(ツ)_/¯
      - name: Compile (pdf-analyzer)
        working-directory: rust
        run: cargo build --quiet --target ${{ matrix.target }}

      - name: Run tests
        working-directory: rust
        run: cargo nextest run --locked --profile ci --target ${{ matrix.target }}

      - name: Generate coverage report
        if: matrix.os == 'ubuntu-latest' && matrix.arch == 'x64'
        working-directory: rust
        run: cargo llvm-cov nextest --lcov --output-path coverage.lcov

      - name: Upload coverage report
        if: matrix.os == 'ubuntu-latest' && matrix.arch == 'x64'
        uses: actions/upload-artifact@v7
        with:
          name: rust-coverage-lcov
          path: rust/coverage.lcov
          retention-days: 7

